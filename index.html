<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kosmo Cal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f3ea;
      margin: 0;
      padding: 24px;
      color: #1f2933;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero img {
      width: 220px;
      max-width: 80%;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 42px;
      margin: 18px 0 4px;
    }

    .subtitle {
      color: #5f6c72;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .status {
      font-weight: bold;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      display: inline-block;
    }

    .ok {
      background: #dcfce7;
      color: #166534;
    }

    .soon {
      background: #fef9c3;
      color: #854d0e;
    }

    .overdue {
      background: #fee2e2;
      color: #991b1b;
    }

    .loading {
      text-align: center;
      color: #5f6c72;
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <img src="Kosmo.png" alt="Comic illustration of Kosmo" />
      <h1>🐶 Kosmo Cal</h1>
      <p class="subtitle">Keeping Kosmo healthy, happy & on track</p>
    </section>

    <section id="content" class="loading">
      Loading Kosmo's calendar...
    </section>
  </main>

  <script>
const API_URL = "https://script.google.com/macros/s/AKfycbyxPI6oV0gTN0d7KDkS1i6ycToyCbzS1OG5QlsdTOzvS0w3JjJSR9nj2FsT5hMl5BtzlA/exec";

    const intervals = {
      tick: { label: "Tick Medication", months: 2 },
      dewormer: { label: "Dewormer", months: 3 },
      checkup: { label: "Yearly Checkup", months: 12 }
    };

    async function loadEvents() {
      try {
        const response = await fetch(API_URL);
        const events = await response.json();

        renderCards(events);
      } catch (error) {
        document.getElementById("content").innerHTML =
          "<p>Could not load Kosmo's calendar.</p>";
        console.error(error);
      }
    }

    function renderCards(events) {
      const content = document.getElementById("content");

      content.innerHTML = Object.keys(intervals).map(type => {
        const latest = getLatestEvent(events, type);

        if (!latest) {
          return createCard(type, null, null, "No entry yet", "soon");
        }

        const lastDate = new Date(latest.date_given);
        const nextDate = addMonths(lastDate, intervals[type].months);
        const status = getStatus(nextDate);

        return createCard(type, lastDate, nextDate, status.text, status.className);
      }).join("");
    }

    function getLatestEvent(events, type) {
      return events
        .filter(event => event.event_type === type)
        .sort((a, b) => new Date(b.date_given) - new Date(a.date_given))[0];
    }

    function addMonths(date, months) {
      const result = new Date(date);
      result.setMonth(result.getMonth() + months);
      return result;
    }

    function getStatus(nextDate) {
      const today = new Date();
      const daysLeft = Math.ceil((nextDate - today) / (1000 * 60 * 60 * 24));

      if (daysLeft < 0) {
        return { text: `Overdue by ${Math.abs(daysLeft)} days`, className: "overdue" };
      }

      if (daysLeft <= 14) {
        return { text: `Due soon — in ${daysLeft} days`, className: "soon" };
      }

      return { text: `OK — due in ${daysLeft} days`, className: "ok" };
    }

    function createCard(type, lastDate, nextDate, statusText, statusClass) {
      return `
        <div class="card">
          <h2>${intervals[type].label}</h2>
          <p><strong>Last:</strong> ${lastDate ? formatDate(lastDate) : "Not recorded yet"}</p>
          <p><strong>Next:</strong> ${nextDate ? formatDate(nextDate) : "Add first entry"}</p>
          <div class="status ${statusClass}">${statusText}</div>
        </div>
      `;
    }

    function formatDate(date) {
      return date.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    }

    loadEvents();
  </script>
</body>
</html>
